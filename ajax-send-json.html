<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax Send JSON</title>
</head>
<body>
<form>
    <label for="username">Username :
        <input type="text" name="username" id="username">
    </label>
    <br>
    <label for="password">Password :
        <input type="password" id="password" name="password">
    </label>
    <br>
    <input type="button" id="login" value="Login">
</form>
<h1 id="response"></h1>
<script>

    function doLogin() {
        const ajax = new XMLHttpRequest();
        ajax.open("POST", "https://jsonplaceholder.typicode.com/posts");
        ajax.onload = function () {
            const response = document.getElementById("response");
            response.innerText = ajax.responseText;
        }
        ajax.setRequestHeader("Content-Type", "application/json");

        const json = {
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        };

        ajax.send(JSON.stringify(json));
    };

    document.getElementById("login").onclick = doLogin;

/*
Hookbin
- Sebelum melanjutkan belajar AJAX, kita perlu bantuan Server sebagai tujuan pengiriman data di AJAX
- Kita akan menggunakan salah satu website gratis dan cukup populer untuk menerima data AJAX yang kita kirim, yaitu Hookbin
- Hookbin adalah aplikasi yang bisa digunakan untuk menerima request HTTP dan menyimpan datanya
- Dengan ini, kita bisa menggunakan Hookbin untuk melihat detail dari data AJAX yang kita kirim
- https://hookbin.com/
*/

/*
Mengirim Data dengan AJAX
- Saat menggunakan AJAX, biasanya bukan hanya untuk mengambil data dari Server
- Kadang kita juga ingin mengirim data dari Client ke Server,
  misalnya membaca semua data di Web Form lalu mengirimkan ke Server menggunakan AJAX
- Untuk melakukan ini, kita bisa menambahkan parameter data yang akan dikirim
  pada method send() milik XMLHttpRequest
- https://developer.mozilla.org/en-US/docs/Web/API/XMLHttpRequest/send
*/

</script>
</body>
</html>
