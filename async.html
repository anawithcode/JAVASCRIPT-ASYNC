<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async</title>
</head>
<body>
<script>
    // Promise<String>
    function getNamePromise(){
        return new Promise(function(resolve, reject) {
            resolve("Ana Promise");
        })
    }

    // Promise<String>
    async function getNameAsync(){
        return "Ana";
    }

    getNamePromise()
    .then((name) => console.info(name));

    getNameAsync()
        .then((name) => console.info(name));


/*
Perbedaan Promise dengan Async/Await

1. Promise
- Promise adalah objek yang merepresentasikan hasil dari operasi asynchronous
  yang mungkin selesai sekarang, nanti, atau gagal.
- Untuk menangani hasilnya, kita menggunakan method then(), catch(), dan finally().
- Contoh:
  getNamePromise()
    .then(result => console.log(result))
    .catch(error => console.error(error));

2. Async/Await
- Async adalah keyword yang digunakan untuk mendefinisikan fungsi asynchronous.
- Fungsi async secara otomatis mengembalikan Promise.
- Await digunakan di dalam fungsi async untuk menunggu hasil Promise,
  sehingga kode terlihat lebih mirip synchronous.
- Contoh:
  async function getNameAsync() {
    return "Ana";
  }

  async function run() {
    try {
      const result = await getNameAsync();
      console.log(result);
    } catch (error) {
      console.error(error);
    }
  }
  run();

Kesimpulan:
- Promise menggunakan chaining dengan then() dan catch().
- Async/Await membuat penulisan kode asynchronous lebih sederhana dan mirip synchronous.
- Keduanya sama-sama berbasis Promise, hanya berbeda gaya penulisan.
*/

</script>
</body>
</html>
