<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax Send Form</title>
</head>
<body>
<h1 id="response">Register</h1>
<form>
    <label for="username">Username :
        <input type="text" name="username" id="username">
    </label>
    <br>
    <label for="name">Name :
        <input type="text" id="name" name="name">
    </label>
    <br>
     <label for="profile">Profile :
        <input type="file" id="profile" name="profile">
    </label>
    <br>
    <input type="button" id="register" value="register">
</form>
<script>

    function doLogin() {
        const ajax = new XMLHttpRequest();
        ajax.open("POST", "https://jsonplaceholder.typicode.com/posts");
        ajax.onload = function () {
            const response = document.getElementById("response");
            response.innerText = ajax.responseText;
        }

        const form = new FormData();
        form.append("username", document.getElementById("username").value);
        form.append("name", document.getElementById("name").value);
        
        const files = document.getElementById("profile").files;
        const firstFile = files.item(0);

        form.append("profile", firstFile)

        ajax.send(form);
    };

    document.getElementById("register").onclick = doLogin;

/*
Upload File dengan AJAX
- Selain menggunakan JSON, Query Param, Form, kadang kita butuh mengirim file ke Server
- Untuk mengirim file ke Server, kita perlu menggunakan object FormData,
  lalu menambahkan object File ke dalam FormData tersebut
- https://developer.mozilla.org/en-US/docs/Web/API/FormData
- https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input/file
- https://developer.mozilla.org/en-US/docs/Web/API/File
- https://developer.mozilla.org/en-US/docs/Web/API/FileList
*/

</script>
</body>
</html>
