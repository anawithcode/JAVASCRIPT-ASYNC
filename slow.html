<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slow</title>
</head>
<body>
<button id="buttonTask">Click Me</button>
<script>

    function slowLog(total) {
        for (let i = 0; i < total; i++) {
            console.info(i);
        }
    }

    document.getElementById("buttonTask").onclick = function () {
        console.info("Start");
        slowLog(100)
        console.info("End");   
    }
/*
Thread di JavaScript
- JavaScript adalah Single Thread (Single Proses),
  artinya walaupun proses yang kita buat adalah Async,
  tetap dijalankan dalam Thread (Proses) yang sama
- Kemampuan satu Thread dalam mengelola beberapa pekerjaan dinamakan Concurrent
- Kemampuan menjalankan beberapa Thread untuk mengelola satu atau lebih pekerjaan dinamakan Paralel
- Untuk membuat proses secara Paralel, kita bisa menggunakan Web Worker
*/

</script>
</body>
</html>
