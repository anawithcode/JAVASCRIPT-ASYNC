<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
/*
State di AJAX
- AJAX memiliki tahapan state, dimana kita bisa mendapatkan banyak sekali state di AJAX
  menggunakan property readyState
- Property readyState mengembalikan nilai number,
  dimana tiap number merupakan representasi dari state-nya
*/

/*
+-------+------------------+------------------------------------------------------+
| Value | State            | Description                                          |
+-------+------------------+------------------------------------------------------+
|   0   | UNSENT           | Client telah dibuat. open() belum dipanggil.         |
|   1   | OPENED           | open() sudah dipanggil.                              |
|   2   | HEADERS_RECEIVED | send() sudah dipanggil, header dan status tersedia.  |
|   3   | LOADING          | Sedang mengunduh; responseText berisi data parsial.  |
|   4   | DONE             | Operasi telah selesai.                               |
+-------+------------------+------------------------------------------------------+
*/

/*
Ready State Change Event
- Jika kita ingin mendengarkan perubahan yang terjadi pada state,
  kita bisa menggunakan event readystatechange
- https://developer.mozilla.org/en-US/docs/Web/API/XMLHttpRequest/onreadystatechange
*/

// Perbedaan addEventListener dengan onreadystatechange

// addEventListener Mendengarkan event spesifik (seperti klik, load, eror, dll.).
// Penggunaan : Elemen HTML (tombol, input), siklus hidup halaman (load), dan request modern.

// onreadystatechange Mendeteksi setiap perubahan status (readyState).
// Penggunaan : Digunakan pada objek XMLHttpRequest (AJAX) atau Document State untuk mengecek kesiapan data.

// KODE READY STATE CHANGE EVENT

    const ajax = new XMLHttpRequest();
    ajax.onreadystatechange = function (){
        console.info(`Ready State Change ${ajax.readyState} `);
    }

</script>
</body>
</html>
