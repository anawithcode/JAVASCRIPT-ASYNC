<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax Send Form</title>
</head>
<body>
<form>
    <label for="username">Username :
        <input type="text" name="username" id="username">
    </label>
    <br>
    <label for="password">Password :
        <input type="password" id="password" name="password">
    </label>
    <br>
    <input type="button" id="login" value="Login">
</form>
<h1 id="response"></h1>
<script>

    function doLogin() {
        const ajax = new XMLHttpRequest();
        ajax.open("POST", "https://jsonplaceholder.typicode.com/posts");
        ajax.onload = function () {
            const response = document.getElementById("response");
            response.innerText = ajax.responseText;
        }
        ajax.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");

        const form = new URLSearchParams();
        form.append("username", document.getElementById("username").value);
        form.append("password", document.getElementById("password").value);

        ajax.send(form);
    };

    document.getElementById("login").onclick = doLogin;

/*
URL Search Param
- Selain menggunakan format JSON, kadang data bisa dikirim menggunakan AJAX dalam bentuk query parameter
- Daripada menambahkan query parameter secara manual ke URL,
  cara yang lebih mudah adalah menggunakan object URLSearchParams
- Object URLSearchParams bisa digunakan sebelum membuat URL
- https://developer.mozilla.org/en-US/docs/Web/API/URLSearchParams
*/


</script>
</body>
</html>
